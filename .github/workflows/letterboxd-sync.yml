name: Sync Letterboxd to Notion

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout letterboxd2notion
        uses: actions/checkout@v4
        with:
          repository: michaelfromorg/letterboxd2notion

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run sync
        env:
          TOKEN_V3: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          LETTERBOXD_USERNAME: ${{ secrets.LETTERBOXD_USERNAME }}
        run: uv run letterboxd2notion sync
